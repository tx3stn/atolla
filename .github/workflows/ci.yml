name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # hermetic llvm toolchain's clang links libtinfo.so.5, removed from ubuntu 24.04
      - name: Install libtinfo5
        run: |
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Cache bazel repository cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-

      - name: Cache bazel disk cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-static-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-${{ github.sha }}
          restore-keys: |
            bazel-disk-static-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-
            bazel-disk-static-${{ runner.os }}-

      # materialises bazel-atolla/external/valdi, which the tsconfigs extend
      # and pull types from; node_modules/.bin is not on PATH in actions, so bunx
      - run: bunx valdi projectsync

      # Same zig version rules_zig pins in MODULE.bazel
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - run: bun run check:static

      # format, lint and format:zig fix in place, so drift only shows up as a dirty tree.
      # projectsync rewrites atolla/tsconfig.json with platform-specific bazel-out
      # paths (linux runner vs the committed darwin ones), so exclude it
      - name: Fail on formatting or lint drift
        run: git diff --exit-code -- . ':!atolla/tsconfig.json'

  bazel-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # hermetic llvm toolchain's clang links libtinfo.so.5, removed from ubuntu 24.04
      - name: Install libtinfo5
        run: |
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Cache bazel repository cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-

      # github.sha suffix forces a fresh save each run; restore-keys warm-start
      # from the newest previous cache
      - name: Cache bazel disk cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-default-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-${{ github.sha }}
          restore-keys: |
            bazel-disk-default-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-
            bazel-disk-default-${{ runner.os }}-

      - run: bun run check:zig

      - run: bun run test:android

      - run: bun run test:components

  # macos_unit_test targets need Xcode/Apple SDKs — the only tests that can't run on linux
