name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"
      - "vrsn.toml"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"
      - "vrsn.toml"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static-checks:
    runs-on: ubuntu-latest
    # cold path (projectsync cache miss + cold remote cache) measured ~25 min,
    # plus the projectsync-outputs save on top
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # of all bun deps only the valdi CLI feeds projectsync output — keying on
      # the locked CLI version (not bun.lock) lets dependabot's wdio/appium/etc.
      # bumps still hit the cache
      - name: Resolve valdi CLI version
        id: valdi-version
        run: echo "valdi=$(jq -r .version node_modules/@snap/valdi/package.json)" >> "$GITHUB_OUTPUT"
      # tsc only needs projectsync's OUTPUTS: the valdi sources/types, the
      # generated res.ts, and the linux-rewritten tsconfig. Cache those directly,
      # keyed on everything that can change them — on a hit this job runs no
      # bazel at all (the 22-minute projectsync build disappears).
      - name: Restore projectsync outputs
        id: projectsync-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            bazel-atolla/external/valdi/modules
            bazel-atolla/external/valdi/src/valdi_modules
            bazel-out/k8-fastbuild/bin/atolla/.valdi_build/projectsync/generated_ts
            bazel-out/k8-fastbuild/bin/external/valdi/src/valdi_modules/src/valdi/valdi_test/.valdi_build/projectsync/generated_ts
            atolla/tsconfig.json
          key: projectsync-${{ runner.os }}-valdi${{ steps.valdi-version.outputs.valdi }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**', 'atolla/BUILD.bazel', 'atolla/res/**') }}
      - name: Install libtinfo5
        if: steps.projectsync-cache.outputs.cache-hit != 'true'
        run: |
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
      - name: Configure bazel caching
        if: steps.projectsync-cache.outputs.cache-hit != 'true'
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          # no local disk cache in CI: the remote cache covers reuse, and writing
          # every output twice fills the runner disk (ENOSPC on cache save)
          echo "build --disk_cache=" >> ~/.bazelrc
          # remote-cache-hit downloads are gated by --jobs, not cores — 4-wide
          # round-trips made 1,200 hit actions take 17 minutes; local execution
          # is still capped separately by --local_resources
          echo "build --jobs=32" >> ~/.bazelrc
          if [ -n "$BUILDBUDDY_API_KEY" ]; then
            # build (not common): plain `bazel query` doesn't inherit build configs
            # and errors on --config=remote-cache; test/run/info etc. inherit build
            echo "build --config=remote-cache" >> ~/.bazelrc
            echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" >> ~/.bazelrc
          fi
      # action outputs live in the BuildBuddy remote cache, but repository-rule
      # downloads (llvm, NDK, JDK, skia sources…) don't — the GH repo cache covers
      # those. Split restore/save so failed runs still bank it (actions/cache only
      # saves on success); contents are deterministic per dep-set, so it saves
      # once per hash+job instead of re-uploading gigabytes every run.
      - name: Restore bazel repository cache
        if: steps.projectsync-cache.outputs.cache-hit != 'true'
        id: restore-bazel-repo
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-
            bazel-repo-${{ runner.os }}-
      - run: bunx valdi projectsync --target //atolla:atolla_projectsync
        id: projectsync
        if: steps.projectsync-cache.outputs.cache-hit != 'true'
        # FIXME: see if valdi update fixes this
      - run: ln -sfn bazel-atolla bazel-_main
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: bun run check:static
      - name: Fail on formatting or lint drift
        run: git diff --exit-code -- . ':!atolla/tsconfig.json'
      # outcome guard: a projectsync that died midway must never get cached
      # under the canonical key (it would poison every later run); still banks
      # the cache when only check:static or the drift check fails
      - name: Save projectsync outputs
        if: ${{ !cancelled() && steps.projectsync-cache.outputs.cache-hit != 'true' && steps.projectsync.outcome == 'success' }}
        uses: actions/cache/save@v5
        with:
          path: |
            bazel-atolla/external/valdi/modules
            bazel-atolla/external/valdi/src/valdi_modules
            bazel-out/k8-fastbuild/bin/atolla/.valdi_build/projectsync/generated_ts
            bazel-out/k8-fastbuild/bin/external/valdi/src/valdi_modules/src/valdi/valdi_test/.valdi_build/projectsync/generated_ts
            atolla/tsconfig.json
          key: projectsync-${{ runner.os }}-valdi${{ steps.valdi-version.outputs.valdi }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**', 'atolla/BUILD.bazel', 'atolla/res/**') }}
      - name: Save bazel repository cache
        if: always() && steps.projectsync-cache.outputs.cache-hit != 'true' && steps.restore-bazel-repo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}

  zig-tests:
    if: ${{ !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'javascript')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: bun run test:zig
      - name: Configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          echo "build --disk_cache=" >> ~/.bazelrc
          # remote-cache-hit downloads are gated by --jobs, not cores — 4-wide
          # round-trips made 1,200 hit actions take 17 minutes; local execution
          # is still capped separately by --local_resources
          echo "build --jobs=32" >> ~/.bazelrc
          if [ -n "$BUILDBUDDY_API_KEY" ]; then
            echo "build --config=remote-cache" >> ~/.bazelrc
            echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" >> ~/.bazelrc
          fi
      - name: Restore bazel repository cache
        id: restore-bazel-repo
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-
            bazel-repo-${{ runner.os }}-
      - run: bun run check:zig
      - name: Save bazel repository cache
        if: always() && steps.restore-bazel-repo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}

  component-tests:
    if: ${{ !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'javascript')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install libtinfo5
        run: |
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
      - name: Configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          # Pin the output base so it can be cached: restoring it gives a warm build
          # (extracted external repos + bazel-out) with no re-extraction or recompile.
          # It's SAVED only on the default branch (below), so MR runs read main's warm
          # base but never write multi-GB entries that would churn the shared 10 GB pool.
          echo "startup --output_base=$HOME/.cache/bazel-ob" >> ~/.bazelrc
          # No local disk cache in CI — the output-base cache plus BuildBuddy cover reuse.
          echo "build --disk_cache=" >> ~/.bazelrc
          echo "build --jobs=32" >> ~/.bazelrc
          if [ -n "$BUILDBUDDY_API_KEY" ]; then
            # build (not common): plain `bazel query` doesn't inherit build configs
            # and errors on --config=remote-cache; test/run/info etc. inherit build
            echo "build --config=remote-cache" >> ~/.bazelrc
            echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" >> ~/.bazelrc
          fi
      # Restore the warm output base (extracted repos + bazel-out) — a hit means no
      # re-extraction and no recompile. The big caches are SAVED only on the default branch
      # (below), so MR runs read main's warm base but never write multi-GB entries; that's
      # what stops another job (e.g. a failing android run) from churning the shared 10 GB
      # pool and evicting this cache.
      - name: Restore bazel output base
        id: restore-bazel-ob
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-ob
          key: bazel-ob-${{ github.job }}-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.sha }}
          restore-keys: |
            bazel-ob-${{ github.job }}-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-
            bazel-ob-${{ github.job }}-${{ runner.os }}-
      # cold path only — a restored output base already contains every extracted repo
      - name: Restore bazel repository cache
        if: steps.restore-bazel-ob.outputs.cache-matched-key == ''
        id: restore-bazel-repo
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-
            bazel-repo-${{ runner.os }}-
      - run: bun run test:components
        timeout-minutes: 60
      - name: Shut down bazel server
        if: always()
        run: bazel shutdown && du -sh ~/.cache/bazel-ob || true
      # Save the multi-GB caches ONLY on the default branch so MR runs never write to (and
      # churn) the shared Actions pool. MR runs still get per-push reuse via BuildBuddy.
      - name: Save bazel output base
        if: always() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.restore-bazel-ob.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-ob
          key: bazel-ob-${{ github.job }}-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.sha }}
      - name: Save bazel repository cache
        if: always() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.restore-bazel-ob.outputs.cache-matched-key == '' && steps.restore-bazel-repo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}

  android-tests:
    if: ${{ !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'javascript')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install libtinfo5
        run: |
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
      - name: Configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          echo "build --disk_cache=" >> ~/.bazelrc
          # remote-cache-hit downloads are gated by --jobs, not cores — 4-wide
          # round-trips made 1,200 hit actions take 17 minutes; local execution
          # is still capped separately by --local_resources
          echo "build --jobs=32" >> ~/.bazelrc
          if [ -n "$BUILDBUDDY_API_KEY" ]; then
            echo "build --config=remote-cache" >> ~/.bazelrc
            echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" >> ~/.bazelrc
          fi
      - name: Restore bazel repository cache
        id: restore-bazel-repo
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-
            bazel-repo-${{ runner.os }}-
      - run: bun run test:android
        timeout-minutes: 30
      - name: Save bazel repository cache
        if: always() && steps.restore-bazel-repo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}

