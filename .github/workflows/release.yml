name: Release

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*']

permissions:
  contents: write

jobs:
  # Gate the release on the CI run that already executed for this commit on main —
  # reuse it, don't re-run the suite. The tag may be pushed before CI finishes, so
  # poll the existing ci.yml run for this SHA and fail unless it concluded success.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require CI to have passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Gating release on CI run for $SHA"
          for _ in $(seq 1 400); do
            result=$(gh api -X GET "/repos/$GH_REPO/actions/workflows/ci.yml/runs" \
              -f head_sha="$SHA" \
              --jq 'if (.workflow_runs|length)==0 then "none"
                    else (.workflow_runs|sort_by(.created_at)|last
                          |"\(.status)\t\(.conclusion)\t\(.html_url)") end')
            if [ "$result" = "none" ]; then
              echo "No CI run for $SHA yet; waiting..."; sleep 30; continue
            fi
            status=$(printf '%s' "$result" | cut -f1)
            conclusion=$(printf '%s' "$result" | cut -f2)
            url=$(printf '%s' "$result" | cut -f3)
            echo "CI run: status=$status conclusion=$conclusion ($url)"
            if [ "$status" = "completed" ]; then
              [ "$conclusion" = "success" ] && exit 0
              echo "::error::CI for $SHA concluded '$conclusion' — refusing to release."
              exit 1
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for CI on $SHA"; exit 1

  build-android:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # Regenerate the Android icons from atolla/res/logo.svg in the background so it
      # overlaps the bazel cache restores below; "Wait for icon generation" joins on
      # it before Build APK. Output is byte-identical to the committed res/ files
      # unless the logo changed, and must land before bazel reads res/.
      - name: Start icon generation (background)
        run: |
          nohup bash -c '
            bun run icons:generate --android > /tmp/icons.log 2>&1
            echo $? > /tmp/icons.exit
          ' >/dev/null 2>&1 &
          echo $! > /tmp/icons.pid
          echo "icon generation started (pid $(cat /tmp/icons.pid))"
      - name: Install libtinfo5
        uses: ./.github/actions/install-libtinfo5
      - name: Make room for the bazel build
        run: |
          # The full APK build (Skia/ICU/harfbuzz/abseil/Valdi + host tools) overflows the
          # ~20 GB free on /. Move bazel's output base — the extracted external repos and
          # bazel-out, the dominant consumer — to the larger /mnt ephemeral disk, and reclaim
          # space from preinstalled toolchains we don't use so the repo-cache tar has room on /.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell
          sudo docker image prune --all --force || true
          sudo mkdir -p /mnt/bazel-ob
          sudo chown "$USER:$USER" /mnt/bazel-ob
          echo "startup --output_base=/mnt/bazel-ob" >> ~/.bazelrc
          df -h / /mnt
      # the remote cache is CI's only cache: version bumps touch a few files, so
      # most compile actions hit artifacts uploaded by the previous release
      - name: Configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          # build:apk passes --config=android, whose .bazelrc lines re-point
          # --disk_cache to ~/.cache/bazel-disk-android; override at the same config
          # scope (home rc wins) so writing every output twice doesn't fill the disk.
          echo "build:android --disk_cache=" >> ~/.bazelrc
          # The remote cache's --remote_download_toplevel (build-without-the-bytes, .bazelrc)
          # is what breaks the Android build. The app's MergeAndroidAssets/resource actions
          # aren't cached (their sources change every version bump) so they execute on the
          # runner, but their asset/resource *inputs* ARE cache hits — and under BwtB those
          # blobs were never downloaded. The local (or even sandboxed) merge then reads inputs
          # that aren't on disk and dies with an opaque "Error during merging" (the rules_android
          # busybox logs only UserException.getMessage(), dropping the wrapped IOException).
          # Forcing --spawn_strategy=sandboxed did NOT fix it — sandboxing doesn't reliably stage
          # those inputs (a build proved MergeAndroidAssets fails even running in the sandbox).
          # Fix the root cause instead: download every cache-hit output so all inputs are present,
          # exactly as the local macOS build has them. Re-execution of cached compiles is still
          # skipped — only their outputs are fetched. Same config scope as .bazelrc's
          # --remote_download_toplevel (home rc wins → all), so it only applies when the cache is on.
          # This makes .bazelrc's --config=android --spawn_strategy=local correct on Linux too.
          echo "build:remote-cache --remote_download_all" >> ~/.bazelrc
          # remote-cache-hit downloads are gated by --jobs, not cores
          echo "build --jobs=32" >> ~/.bazelrc
          if [ -n "$BUILDBUDDY_API_KEY" ]; then
            echo "build --config=remote-cache" >> ~/.bazelrc
            echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" >> ~/.bazelrc
          fi
      # restore/save split so a build that fails at minute 110 still banks its
      # repo fetches and compile progress for the retry (actions/cache only
      # saves on success); -${{ github.job }} keeps the android and ios repo
      # sets from clobbering each other under one key
      - name: Restore bazel repository cache
        id: restore-bazel-repo
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-
            bazel-repo-${{ runner.os }}-
      # Join on the background icon generation started after bun install. The process
      # was launched in a different step's shell, so we poll its pid and read the
      # exit status it wrote, rather than `wait` (which only works for child procs).
      - name: Wait for icon generation
        run: |
          pid="$(cat /tmp/icons.pid)"
          while kill -0 "$pid" 2>/dev/null; do sleep 1; done
          cat /tmp/icons.log || true
          if [ ! -f /tmp/icons.exit ]; then
            echo "icon generation exited without writing a status file"; exit 1
          fi
          code="$(cat /tmp/icons.exit)"
          echo "icon generation exit code: $code"
          exit "$code"
      - name: Build APK
        run: JAVA_HOME="$JAVA_HOME_17_X64" bun run build:apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/atolla_android.apk
          if-no-files-found: error
      - name: Save bazel repository cache
        if: always() && steps.restore-bazel-repo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}-${{ github.job }}

