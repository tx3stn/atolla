name: Release

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*']

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # Regenerate the Android icons from atolla/res/logo.svg in the background so it
      # overlaps the bazel cache restores below; "Wait for icon generation" joins on
      # it before Build APK. Output is byte-identical to the committed res/ files
      # unless the logo changed, and must land before bazel reads res/.
      - name: start icon generation (background)
        run: |
          nohup bash -c '
            bun run icons:generate --android > /tmp/icons.log 2>&1
            echo $? > /tmp/icons.exit
          ' >/dev/null 2>&1 &
          echo $! > /tmp/icons.pid
          echo "icon generation started (pid $(cat /tmp/icons.pid))"
      - uses: ./.github/actions/install-libtinfo5
      - name: Make room for the bazel build
        run: |
          # The full APK build (Skia/ICU/harfbuzz/abseil/Valdi + host tools) overflows the
          # ~20 GB free on /. Move bazel's output base — the extracted external repos and
          # bazel-out, the dominant consumer — to the larger /mnt ephemeral disk, and reclaim
          # space from preinstalled toolchains we don't use so the repo-cache tar has room on /.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell
          sudo docker image prune --all --force || true
          sudo mkdir -p /mnt/bazel-ob
          sudo chown "$USER:$USER" /mnt/bazel-ob
          echo "startup --output_base=/mnt/bazel-ob" >> ~/.bazelrc
          df -h / /mnt
      # the remote cache is CI's only cache: version bumps touch a few files, so
      # most compile actions hit artifacts uploaded by the previous release
      - name: configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          {
            # build:apk passes --config=android, whose .bazelrc lines re-point
            # --disk_cache to ~/.cache/bazel-disk-android; override at the same config
            # scope (home rc wins) so writing every output twice doesn't fill the disk.
            echo "build:android --disk_cache="
            # MergeAndroidAssets fails in CI but not locally because the remote cache serves
            # ValdiCompile's per-module asset tree artifacts with their nested
            # _configs/*.tsconfig.json files DROPPED (a tree-artifact cache round-trip bug). The
            # module symbols (assets.bin) still list those assets, so the merge sees a duplicate-
            # asset conflict across modules, tries to content-compare the now-absent files, and
            # dies with a NoSuchFileException that the rules_android busybox masks as the opaque
            # "Error during merging". A local build emits the complete dirs — proven in an amd64
            # container: forcing local execution restored the missing _configs files and the merge
            # returned 0. So force ValdiCompile to run locally and never be served from the remote
            # cache. Every other action still hits the cache; only the ~dozen valdi module compiles
            # re-run per release. (This replaces an earlier --remote_download_all attempt that
            # couldn't help: the artifacts are cached incomplete regardless of download mode.)
            echo "build:android --modify_execution_info=ValdiCompile=+no-remote-cache"
            # remote-cache-hit downloads are gated by --jobs, not cores
            echo "build --jobs=32"
            if [ -n "$BUILDBUDDY_API_KEY" ]; then
              echo "build --config=remote-cache"
              echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
            fi
          } >> ~/.bazelrc
      # Restore-only: read the shared repository cache that CI's android-tests job
      # banks on main (default-branch caches are readable from tag runs). This tag
      # build can't usefully SAVE — a tag-scoped cache isn't visible to main runs —
      # and app-only maven deps not in the test set just partial-hit and re-fetch.
      - name: restore bazel repository cache
        id: restore-bazel-repo
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-
      # Join on the background icon generation started after bun install. The process
      # was launched in a different step's shell, so we poll its pid and read the
      # exit status it wrote, rather than `wait` (which only works for child procs).
      - name: wait for icon generation
        run: |
          pid="$(cat /tmp/icons.pid)"
          while kill -0 "$pid" 2>/dev/null; do sleep 1; done
          cat /tmp/icons.log || true
          if [ ! -f /tmp/icons.exit ]; then
            echo "icon generation exited without writing a status file"; exit 1
          fi
          code="$(cat /tmp/icons.exit)"
          echo "icon generation exit code: $code"
          exit "$code"
      - name: build apk
        run: JAVA_HOME="$JAVA_HOME_17_X64" bun run build:apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/atolla_android.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # Regenerate the iOS icons from atolla/res/logo.svg in the background so it
      # overlaps the bazel cache restores below; "wait for icon generation" joins on
      # it before Build simulator IPA. Output is byte-identical to the committed res/
      # files unless the logo changed, and must land before bazel reads assets.
      - name: start icon generation (background)
        run: |
          nohup bash -c '
            bun run icons:generate --ios > /tmp/icons.log 2>&1
            echo $? > /tmp/icons.exit
          ' >/dev/null 2>&1 &
          echo $! > /tmp/icons.pid
          echo "icon generation started (pid $(cat /tmp/icons.pid))"
      # the remote cache is CI's only cross-run cache: version bumps touch a few files,
      # so most compile actions hit artifacts uploaded by the previous release
      - name: configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          {
            # build:ipa passes --config=ios, whose .bazelrc lines re-point --disk_cache
            # to ~/.cache/bazel-disk-ios; override at the same config scope (home rc wins)
            # so writing every output twice doesn't fill the disk.
            echo "build:ios --disk_cache="
            # remote-cache-hit downloads are gated by --jobs, not cores
            echo "build --jobs=32"
            if [ -n "$BUILDBUDDY_API_KEY" ]; then
              echo "build --config=remote-cache"
              echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
            fi
          } >> ~/.bazelrc
      # Restore-only: read the shared repository cache that CI's ios-tests job banks on
      # main (default-branch caches are readable from tag runs). This tag build can't
      # usefully SAVE — a tag-scoped cache isn't visible to main runs — and app-only
      # deps not in the test set just partial-hit and re-fetch.
      - name: restore bazel repository cache
        id: restore-bazel-repo
        uses: actions/cache/restore@v6
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '.bazelversion', 'patches/**') }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-
      # Join on the background icon generation started after bun install. The process
      # was launched in a different step's shell, so we poll its pid and read the
      # exit status it wrote, rather than `wait` (which only works for child procs).
      - name: wait for icon generation
        run: |
          pid="$(cat /tmp/icons.pid)"
          while kill -0 "$pid" 2>/dev/null; do sleep 1; done
          cat /tmp/icons.log || true
          if [ ! -f /tmp/icons.exit ]; then
            echo "icon generation exited without writing a status file"; exit 1
          fi
          code="$(cat /tmp/icons.exit)"
          echo "icon generation exit code: $code"
          exit "$code"
      # Simulator build — device (arm64) builds need an ios_provisioning_profile
      # on valdi_application plus signing secrets in CI
      - name: build ipa
        run: IOS_CPUS=sim_arm64 bun run build:ipa
      - uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: build/atolla_ios.ipa
          if-no-files-found: error

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history + tags so git-cliff can diff this tag against the previous
      # release. Must run before download-artifact: checkout cleans the workspace
      # by default and would otherwise wipe the downloaded artifacts.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts
      # Re-sign the bazel-built APK (debug-signed by default) with the private release
      # key so published builds have a stable, verifiable identity and a working
      # in-place upgrade path. Signing happens here, in the minimal publish job, so the
      # keystore secret never enters the heavy build-android runner or bazel's action
      # cache. The keystore lives only as a base64 CI secret, is decoded to a temp file
      # for this step, and is removed on exit; the job fails closed if the secret is
      # absent rather than shipping a debug-signed release.
      - name: sign apk
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "ANDROID_KEYSTORE_B64 secret is not set — refusing to publish a debug-signed release." >&2
            exit 1
          fi
          sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          bt="$(ls -d "$sdk"/build-tools/* | sort -V | tail -1)"
          echo "Using build-tools: $bt"
          keystore="$(mktemp)"
          trap 'rm -f "$keystore"' EXIT
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$keystore"
          "$bt/zipalign" -p -f 4 artifacts/atolla_android.apk artifacts/atolla_android_aligned.apk
          "$bt/apksigner" sign \
            --ks "$keystore" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out artifacts/atolla_android.apk \
            artifacts/atolla_android_aligned.apk
          rm -f artifacts/atolla_android_aligned.apk
          "$bt/apksigner" verify --verbose --print-certs artifacts/atolla_android.apk
      # Build the notes from the conventional commits since the previous tag,
      # grouped into Features/Fixes/Other (see cliff.toml). --generate-notes only
      # lists merged PRs, so it produced empty bodies for our direct-to-main pushes.
      - name: generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md
      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv artifacts/atolla_android.apk "atolla-$GITHUB_REF_NAME.apk"
          mv artifacts/atolla_ios.ipa "atolla-$GITHUB_REF_NAME.ipa"
          gh release create "$GITHUB_REF_NAME" \
            "atolla-$GITHUB_REF_NAME.apk" \
            "atolla-$GITHUB_REF_NAME.ipa" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md
