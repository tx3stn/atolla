  release:
    needs: [build-android] # build-ios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mv artifacts/atolla_android.apk "atolla-$GITHUB_REF_NAME.apk"
          # mv artifacts/atolla_ios.ipa "atolla-$GITHUB_REF_NAME.ipa"
          gh release create "$GITHUB_REF_NAME" \
            "atolla-$GITHUB_REF_NAME.apk" \
            # "atolla-$GITHUB_REF_NAME.ipa" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
