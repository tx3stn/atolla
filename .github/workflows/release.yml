name: Release

on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*']

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Check tag matches package.json version
        run: |
          version="$(jq -r .version package.json)"
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $version"
            exit 1
          fi

  checks:
    needs: verify
    uses: ./.github/workflows/ci.yml
    # without this the called workflow sees an empty BUILDBUDDY_API_KEY and
    # cold-builds everything (~2h) with no remote cache
    secrets: inherit
    permissions:
      contents: read

  build-android:
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # remote cache on top of the disk cache (kept — macOS runners have the
      # space): version bumps only touch a few files, so most compile actions
      # hit artifacts uploaded by the previous release
      - name: Configure bazel caching
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          if [ -n "$BUILDBUDDY_API_KEY" ]; then
            echo "build --config=remote-cache" >> ~/.bazelrc
            echo "build --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY" >> ~/.bazelrc
          fi
      # restore/save split so a build that fails at minute 110 still banks its
      # repo fetches and compile progress for the retry (actions/cache only
      # saves on success); -${{ github.job }} keeps the android and ios repo
      # sets from clobbering each other under one key
      - name: Restore bazel repository cache
        id: restore-bazel-repo
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-${{ github.job }}
          restore-keys: |
            bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-
            bazel-repo-${{ runner.os }}-
      - name: Restore bazel disk cache
        id: restore-bazel-disk
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel-disk-android
          key: bazel-disk-android-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-${{ github.sha }}
          restore-keys: |
            bazel-disk-android-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-
            bazel-disk-android-${{ runner.os }}-
      - name: Build APK
        run: JAVA_HOME="$JAVA_HOME_17_arm64" bun run build:apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/atolla_android.apk
          if-no-files-found: error
      - name: Save bazel repository cache
        if: always() && steps.restore-bazel-repo.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-${{ github.job }}
      - name: Save bazel disk cache
        if: always() && steps.restore-bazel-disk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/bazel-disk-android
          key: bazel-disk-android-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE', '.bazelversion') }}-${{ github.sha }}

