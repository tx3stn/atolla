# git-cliff config (https://git-cliff.org). The Release workflow runs
# `git cliff --latest` to build a release's notes from the conventional commits
# since the previous tag. Mirrors the PR-label grouping the old
# `--generate-notes` used: feat -> Features, fix -> Fixes, everything else ->
# Other, so nothing is dropped. Add a `skip = true` parser below to hide a type.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = false
tag_pattern = '^[0-9]+\.[0-9]+\.[0-9]+$'
sort_commits = "newest"
commit_parsers = [
  { message = "^[Mm]erge", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Fixes" },
  { message = ".*", group = "Other" },
]
